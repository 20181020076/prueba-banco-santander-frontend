<div class="w-screen flex flex-col">
    <h1 class="font-bold text-2xl m-2">Rick and Morty App</h1>
    <div class="w-full flex justify-center align-middle">
        <input class="border-2 rounded-2xl my-2 w-[80%] p-1" placeholder="Ingrese nombre" type="text" name="" id="" 
        (input)="setSearchName($any($event.target).value)">

    </div>
</div>
<div class="w-full flex justify-around flex-wrap gap-3">
    @for (c of characters(); track $index) {
        <div class="w-[250px] flex flex-col border border-black rounded-b-2xl overflow-hidden cursor-pointer hover:transform hover:scale-102" [routerLink]="['/',c.id]">
            <img [src]="c.image" [alt]="c.name" class="w-full h-full object-cover">
            <div class="flex p-3">
                <div class="w-1/2">
                    <h3>{{c.name}}</h3>
                    <p>{{c.species}}</p>
                </div>
                <div class="h-full w-1/2 flex justify-center align-middle">
                    <span class="p-0 m-0 text-center">{{c.status}}</span>
                </div>
                
            </div>
        </div>
    }
</div>
